<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFCDE0"/>
      <stop offset="100%" stop-color="#FF8CB0"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4466AA"/>
      <stop offset="100%" stop-color="#1A2255"/>
    </radialGradient>
    <radialGradient id="footGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF6090"/>
      <stop offset="100%" stop-color="#CC3366"/>
    </radialGradient>
  </defs>

  <!-- Body (breathe) -->
  <ellipse cx="100" cy="105" rx="72" fill="#FFB0C8">
    <animate attributeName="ry" values="68;71;68" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="100" cy="105" rx="72" fill="url(#bodyGrad)">
    <animate attributeName="ry" values="68;71;68" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left foot (walking) -->
  <ellipse cx="65" rx="28" ry="14" fill="url(#footGrad)">
    <animate attributeName="cy" values="168;165;168;171;168" dur="0.4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Right foot (walking, offset) -->
  <ellipse cx="135" rx="28" ry="14" fill="url(#footGrad)">
    <animate attributeName="cy" values="168;171;168;165;168" dur="0.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left arm -->
  <ellipse cx="30" cy="120" rx="20" ry="14" fill="#FF8CB0" transform="rotate(-25 30 120)"/>

  <!-- Right arm (waving) -->
  <ellipse cx="170" cy="90" rx="20" ry="14" fill="#FF8CB0">
    <animateTransform attributeName="transform" type="rotate"
      values="15 170 90;50 170 90;15 170 90"
      dur="1.2s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </ellipse>

  <!-- Left eye (blink) -->
  <ellipse cx="80" cy="90" rx="12" fill="url(#eyeGrad)">
    <animate attributeName="ry" values="18;18;18;1;18" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="82" cy="85" rx="5" fill="#FFFFFF" opacity="0.9">
    <animate attributeName="ry" values="7;7;7;0.3;7" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="78" cy="96" rx="2" fill="#FFFFFF" opacity="0.5">
    <animate attributeName="ry" values="3;3;3;0.1;3" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right eye (blink) -->
  <ellipse cx="120" cy="90" rx="12" fill="url(#eyeGrad)">
    <animate attributeName="ry" values="18;18;18;1;18" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="122" cy="85" rx="5" fill="#FFFFFF" opacity="0.9">
    <animate attributeName="ry" values="7;7;7;0.3;7" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="118" cy="96" rx="2" fill="#FFFFFF" opacity="0.5">
    <animate attributeName="ry" values="3;3;3;0.1;3" dur="4s"
      keyTimes="0;0.7;0.85;0.9;1" repeatCount="indefinite"/>
  </ellipse>

  <!-- Mouth -->
  <ellipse cx="100" cy="118" rx="8" ry="5" fill="#CC3366"/>
  <ellipse cx="100" cy="116" rx="6" ry="3" fill="#FF6090"/>

  <!-- Cheek blush (pulse) -->
  <ellipse cx="60" cy="112" rx="10" ry="7" fill="#FF6090">
    <animate attributeName="opacity" values="0.4;0.75;0.4" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="140" cy="112" rx="10" ry="7" fill="#FF6090">
    <animate attributeName="opacity" values="0.4;0.75;0.4" dur="2s" repeatCount="indefinite"/>
  </ellipse>
</svg>
