<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="wdBody" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F5C070"/>
      <stop offset="100%" stop-color="#D4853A"/>
    </radialGradient>
    <radialGradient id="wdFoot" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#D4853A"/>
      <stop offset="100%" stop-color="#A06020"/>
    </radialGradient>
  </defs>

  <!-- Body (breathe) -->
  <ellipse cx="100" cy="95" rx="62" fill="#E8A050">
    <animate attributeName="ry" values="60;62;60" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="100" cy="95" rx="62" fill="url(#wdBody)">
    <animate attributeName="ry" values="60;62;60" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left foot (walking) -->
  <ellipse cx="70" rx="22" ry="11" fill="url(#wdFoot)">
    <animate attributeName="cy" values="158;155;158;161;158" dur="0.4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Right foot (walking, offset) -->
  <ellipse cx="130" rx="22" ry="11" fill="url(#wdFoot)">
    <animate attributeName="cy" values="158;161;158;155;158" dur="0.4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left eye (blink) -->
  <ellipse cx="75" cy="88" rx="10" fill="#1A1A2E">
    <animate attributeName="ry" values="14;14;14;1;14" dur="3.5s"
      keyTimes="0;0.65;0.82;0.88;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="77" cy="83" rx="4" fill="#FFFFFF" opacity="0.85">
    <animate attributeName="ry" values="5;5;5;0.3;5" dur="3.5s"
      keyTimes="0;0.65;0.82;0.88;1" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right eye (blink) -->
  <ellipse cx="125" cy="88" rx="10" fill="#1A1A2E">
    <animate attributeName="ry" values="14;14;14;1;14" dur="3.5s"
      keyTimes="0;0.65;0.82;0.88;1" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="127" cy="83" rx="4" fill="#FFFFFF" opacity="0.85">
    <animate attributeName="ry" values="5;5;5;0.3;5" dur="3.5s"
      keyTimes="0;0.65;0.82;0.88;1" repeatCount="indefinite"/>
  </ellipse>

  <!-- Cheek blush (pulse) -->
  <ellipse cx="55" cy="105" rx="9" ry="6" fill="#E87040">
    <animate attributeName="opacity" values="0.4;0.65;0.4" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="145" cy="105" rx="9" ry="6" fill="#E87040">
    <animate attributeName="opacity" values="0.4;0.65;0.4" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
</svg>
